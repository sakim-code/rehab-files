<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>재활치료센터 자료실</title>
<style>
  :root{
    --brand:#2b7a78; --brand-dark:#17252a; --bg:#f6f8f8; --card:#ffffff;
    --line:#e3e9e9; --text:#1c2b2d; --muted:#6b7c7e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","맑은 고딕",sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
  }
  header{
    background:var(--brand-dark); color:#fff; padding:28px 20px;
  }
  header .wrap{max-width:1080px; margin:0 auto;}
  header h1{margin:0 0 6px; font-size:22px;}
  header p{margin:0; color:#c8d6d6; font-size:14px;}
  main{max-width:1080px; margin:0 auto; padding:24px 20px 60px;}
  .tabs{display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
  .tab{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:9px 18px; border-radius:999px; cursor:pointer; font-size:14px; font-weight:600;
  }
  .tab.active{background:var(--brand); color:#fff; border-color:var(--brand);}
  section.panel{display:none;}
  section.panel.active{display:block;}
  h2.cat{font-size:16px; margin:26px 0 12px; padding-bottom:6px; border-bottom:2px solid var(--line);}
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px;
  }
  .thumb{
    background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden;
    cursor:pointer; transition:transform .12s, box-shadow .12s;
  }
  .thumb:hover{transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.08);}
  .thumb img{width:100%; height:130px; object-fit:cover; display:block; background:#eee;}
  .thumb .name{padding:8px 10px; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .doclist{display:flex; flex-direction:column; gap:10px;}
  .docitem{
    display:flex; align-items:center; gap:14px; background:var(--card);
    border:1px solid var(--line); border-radius:12px; padding:14px 16px;
  }
  .docitem .ico{font-size:22px;}
  .docitem .meta{flex:1; min-width:0;}
  .docitem .meta .t{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .docitem .meta .s{font-size:12px; color:var(--muted);}
  .btn{
    background:var(--brand); color:#fff; border:none; text-decoration:none;
    padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; white-space:nowrap;
  }
  .empty{color:var(--muted); font-size:14px; padding:30px 0; text-align:center;}
  .note{background:#fff8e1; border:1px solid #f2e2a8; color:#7a5b00; padding:12px 14px; border-radius:10px; font-size:13px; margin-bottom:18px;}
  /* Lightbox */
  #lb{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
    align-items:center; justify-content:center; flex-direction:column; z-index:50; padding:20px;
  }
  #lb.open{display:flex;}
  #lb img{max-width:92vw; max-height:78vh; border-radius:8px;}
  #lb .bar{margin-top:14px; display:flex; gap:10px; align-items:center;}
  #lb .cap{color:#fff; font-size:14px;}
  #lb .x{position:absolute; top:18px; right:24px; color:#fff; font-size:30px; cursor:pointer; line-height:1;}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:24px;}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>재활치료센터 자료실</h1>
    <p>상담자료와 이미지를 확인하고 다운로드하실 수 있습니다.</p>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-tab="images">🖼️ 이미지</button>
    <button class="tab" data-tab="docs">📄 상담자료</button>
  </div>

  <section id="images" class="panel active"></section>
  <section id="docs" class="panel"></section>
</main>

<div id="lb">
  <span class="x" onclick="closeLb()">×</span>
  <img id="lbimg" src="" alt="" />
  <div class="bar">
    <span class="cap" id="lbcap"></span>
    <a class="btn" id="lbdl" href="" download>다운로드</a>
  </div>
</div>

<footer>© 재활치료센터 자료실</footer>

<script>
/* ================== 설정 (여기만 바꾸면 됩니다) ================== */
const CONFIG = {
  user:   "sakim-code",   // 예: "sakim-code"
  repo:   "rehab-files",      // 예: "rehab-files"
  branch: "main"
};
/* =============================================================== */

const IMG_EXT = ["jpg","jpeg","png","gif","webp","bmp","svg","heic"];
const api = (path) =>
  `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`;

function isImage(name){
  const e = name.split(".").pop().toLowerCase();
  return IMG_EXT.includes(e);
}
function fileIcon(name){
  const e = name.split(".").pop().toLowerCase();
  if(e==="pdf") return "📕";
  if(["doc","docx"].includes(e)) return "📘";
  if(["xls","xlsx","csv"].includes(e)) return "📗";
  if(["ppt","pptx"].includes(e)) return "📙";
  if(["zip","rar","7z"].includes(e)) return "🗜️";
  return "📄";
}
function humanSize(b){
  if(!b && b!==0) return "";
  if(b<1024) return b+" B";
  if(b<1048576) return (b/1024).toFixed(0)+" KB";
  return (b/1048576).toFixed(1)+" MB";
}

// 폴더 하나를 읽어 {files, dirs} 로 분리
async function listFolder(path){
  const res = await fetch(api(path));
  if(res.status===404) return {missing:true, files:[], dirs:[]};
  if(!res.ok) throw new Error("GitHub 응답 오류 ("+res.status+")");
  const data = await res.json();
  if(!Array.isArray(data)) return {files:[], dirs:[]};
  return {
    files: data.filter(x=>x.type==="file"),
    dirs:  data.filter(x=>x.type==="dir")
  };
}

function notConfigured(){
  return CONFIG.user.includes("여기에") || CONFIG.repo.includes("여기에");
}

/* ---------- 이미지 탭 ---------- */
async function renderImages(){
  const el = document.getElementById("images");
  if(notConfigured()){ el.innerHTML = configNote(); return; }
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const root = await listFolder("images");
    if(root.missing){ el.innerHTML = missingNote("images"); return; }
    let html = "";
    // 최상위 이미지 (카테고리 없음)
    const topImgs = root.files.filter(f=>isImage(f.name));
    if(topImgs.length) html += '<h2 class="cat">전체</h2>' + imgGrid(topImgs);
    // 하위 폴더 = 카테고리
    for(const d of root.dirs){
      const sub = await listFolder("images/"+d.name);
      const imgs = sub.files.filter(f=>isImage(f.name));
      if(imgs.length) html += `<h2 class="cat">${d.name}</h2>` + imgGrid(imgs);
    }
    el.innerHTML = html || '<div class="empty">아직 올라온 이미지가 없습니다. images 폴더에 사진을 올려주세요.</div>';
  }catch(e){ el.innerHTML = errNote(e.message); }
}
function imgGrid(files){
  return '<div class="grid">' + files.map(f=>{
    const url = f.download_url;
    return `<div class="thumb" onclick="openLb('${url}','${f.name.replace(/'/g,"")}')">
      <img loading="lazy" src="${url}" alt="${f.name}"/>
      <div class="name">${f.name}</div></div>`;
  }).join("") + '</div>';
}

/* ---------- 상담자료 탭 ---------- */
async function renderDocs(){
  const el = document.getElementById("docs");
  if(notConfigured()){ el.innerHTML = configNote(); return; }
  el.innerHTML = '<div class="empty">불러오는 중…</div>';
  try{
    const root = await listFolder("documents");
    if(root.missing){ el.innerHTML = missingNote("documents"); return; }
    let html = "";
    const topDocs = root.files.filter(f=>!isImage(f.name) && f.name!==".gitkeep");
    if(topDocs.length) html += '<h2 class="cat">전체</h2>' + docList(topDocs);
    for(const d of root.dirs){
      const sub = await listFolder("documents/"+d.name);
      const docs = sub.files.filter(f=>f.name!==".gitkeep");
      if(docs.length) html += `<h2 class="cat">${d.name}</h2>` + docList(docs);
    }
    el.innerHTML = html || '<div class="empty">아직 올라온 상담자료가 없습니다. documents 폴더에 파일을 올려주세요.</div>';
  }catch(e){ el.innerHTML = errNote(e.message); }
}
function docList(files){
  return '<div class="doclist">' + files.map(f=>
    `<div class="docitem">
      <div class="ico">${fileIcon(f.name)}</div>
      <div class="meta"><div class="t">${f.name}</div><div class="s">${humanSize(f.size)}</div></div>
      <a class="btn" href="${f.download_url}" download>다운로드</a>
    </div>`).join("") + '</div>';
}

/* ---------- 안내 메시지 ---------- */
function configNote(){
  return '<div class="note">⚙️ 아직 설정 전이에요. index.html 파일 위쪽 <b>CONFIG</b> 부분에 깃허브 아이디와 저장소 이름을 넣어주세요.</div>';
}
function missingNote(folder){
  return `<div class="note">📁 <b>${folder}</b> 폴더가 아직 없습니다. 저장소에 <b>${folder}</b> 폴더를 만들고 파일을 올려주세요.</div>`;
}
function errNote(msg){
  return `<div class="note">잠시 불러올 수 없습니다: ${msg}<br>잠시 후 새로고침 해주세요. (GitHub는 시간당 조회 횟수 제한이 있습니다)</div>`;
}

/* ---------- 라이트박스 ---------- */
function openLb(url,name){
  document.getElementById("lbimg").src=url;
  document.getElementById("lbcap").textContent=name;
  document.getElementById("lbdl").href=url;
  document.getElementById("lb").classList.add("open");
}
function closeLb(){ document.getElementById("lb").classList.remove("open"); }
document.getElementById("lb").addEventListener("click",e=>{ if(e.target.id==="lb") closeLb(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeLb(); });

/* ---------- 탭 전환 ---------- */
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById(t.dataset.tab).classList.add("active");
  });
});

/* ---------- 시작 ---------- */
renderImages();
renderDocs();
</script>
</body>
</html>
